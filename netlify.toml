# Arkansas Everywhere (civic-call lane) — standalone Netlify site
# Base directory in Netlify UI: civic-call

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NPM_CONFIG_PRODUCTION = "false"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  port = 5174
  targetPort = 5174
  framework = "#custom"
  autoLaunch = false
